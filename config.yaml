experiment_id: TINY_EXTREME_SIMPLE_3R
provider: local
model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
device: cpu
load_in_8bit: false
language: en
topic: Ban pineapple on pizza?
agents:
- name: Speaker_1
  system_prompt: 'You are speaker 1. You are for the ban. Speak very short, 1 sentence.
    [STRICT]: Never mention you are an AI. Stay in character.'
- name: Speaker_2
  system_prompt: 'You are speaker 2. You are against the ban. Speak very short, 1
    sentence. [STRICT]: Never mention you are an AI. Stay in character.'
- name: Speaker_3
  system_prompt: 'You are speaker 3. You are neutral. Speak very short, 1 sentence.
    [STRICT]: Never mention you are an AI. Stay in character.'
judge:
  system_prompt: Decide yes or no.
architecture: relay
provide_turn_context: false
decision_protocol: consensus
consensus_threshold: 1.0
num_rounds: 3
temperature: 0.3
max_new_tokens: 100
do_sample: true
