provider: local
model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
device: cpu
temperature: 0.7
max_new_tokens: 256
do_sample: true
architecture: round_robin
num_rounds: 2
topic: Czy sztuczna inteligencja zastąpi programistów w ciągu 10 lat?
decision_protocol: voting
consensus_threshold: 0.66
max_consensus_rounds: 3
agents:
- name: Optymista
  system_prompt: Jesteś entuzjastą technologii. Argumentujesz ZA tezą. Odpowiadaj
    zwięźle, 2-3 zdania.
- name: Sceptyk
  system_prompt: Jesteś krytykiem technologii. Argumentujesz PRZECIW tezie. Odpowiadaj
    zwięźle, 2-3 zdania.
- name: Pragmatyk
  system_prompt: Jesteś realistą. Szukasz złotego środka i analizujesz obie strony.
    Odpowiadaj zwięźle, 2-3 zdania.
judge:
  system_prompt: Jesteś sędzią debaty. Podsumuj argumenty wszystkich stron i oceń
    kto był najbardziej przekonujący. Odpowiedz w 3-5 zdaniach.
